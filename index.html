<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Τα Όργανά μου</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #ffffff;
            width: 100%;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold;
            font-size: 1.5rem;
            color: #1a2a6c;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            width: 95%;
            max-width: 500px;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        .card {
            background-image: url('unnamed.jpg'); 
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 15px;
            height: 125px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            border: 3px solid #b8860b; 
            position: relative;
        }

        .instrument-img-container {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            border: 2px solid #b8860b; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .instrument-img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .instrument-name {
            flex-grow: 1;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 900;
            color: #000;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            padding: 0 10px;
            text-transform: uppercase;
        }

        .button-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        .action-icon {
            width: 48px;
            height: 48px;
            cursor: pointer;
            transition: transform 0.1s;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.6));
        }

        /* --- MODAL ΠΟΥ ΠΙΑΝΕΙ ΟΛΗ ΤΗΝ ΟΘΟΝΗ --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Ξεκινάει από πάνω */
            z-index: 2000;
        }

        .modal-content {
            width: 100%; /* Full πλάτος στο κινητό */
            height: 100%; /* Full ύψος */
            background: white;
            display: flex;
            flex-direction: column;
            border: none;
        }

        /* --- TABS (ΕΤΙΚΕΤΕΣ) --- */
        .tabs-header {
            display: flex;
            background: #1a2a6c;
            width: 100%;
            border-bottom: 3px solid #b8860b;
        }

        .tab-link {
            flex: 1;
            padding: 15px 5px;
            color: white;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-right: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
        }

        .tab-link.active {
            background: #b8860b;
            color: black;
        }

        /* --- ΠΕΡΙΕΧΟΜΕΝΟ --- */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            background: #fff;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .close-btn {
            background: #cc0000;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>Τα Όργανά μου</header>

    <div class="container" id="list"></div>

    <div id="modal" class="overlay">
        <div class="modal-content">
            <div class="tabs-header" id="modal-tabs">
                <div class="tab-link active" onclick="changeTab(this, 'info')">Πληροφορίες</div>
                <div class="tab-link" onclick="changeTab(this, 'qa')">Ερωτήσεις</div>
                <div class="tab-link" onclick="changeTab(this, 'rep')">Ρεπερτόριο</div>
            </div>
            
            <div class="iframe-container">
                <iframe id="frame" src=""></iframe>
            </div>

            <div class="close-btn" onclick="closeModal()">✕ ΚΛΕΙΣΙΜΟ</div>
        </div>
    </div>

    <script>
        const instruments = {
            'violin': 'ΒΙΟΛΙ', 'viola': 'ΒΙΟΛΑ', 'Cello': 'ΤΣΕΛΟ',
            'Clarinet': 'ΚΛΑΡΙΝΟ', 'Contrabass': 'ΚΟΝΤΡΑΜΠΑΣΣΟ',
            'Cymbal': 'ΠΙΑΤΑ', 'English horn': 'ΑΓΓΛΙΚΟ ΚΟΡΝΟ',
            'fagotto': 'ΦΑΓΚΟΤΟ', 'flute': 'ΦΛΑΟΥΤΟ', 'Guitar': 'ΚΙΘΑΡΑ',
            'Harp': 'ΑΡΠΑ', 'Horn': 'ΚΟΡΝΟ', 'oboe': 'ΟΜΠΟΕ',
            'Piano': 'ΠΙΑΝΟ', 'piccolo': 'ΠΙΚΟΛΟ', 'Timpani': 'ΤΥΜΠΑΝΑ',
            'Trombone': 'ΤΡΟΜΠΟΝΙ', 'Trumpet': 'ΤΡΟΜΠΕΤΑ',
            'tuba': 'ΤΟΥΜΠΑ', 'vibraphone': 'ΜΕΤΑΛΛΟΦΩΝΟ', 'Xylophone': 'ΞΥΛΟΦΩΝΟ'
        };

        const driveIds = {
            'violin': '1kzjmLde-86Zva_bWZqNZto2Ry4aXgk6J',
            'viola': '1Z05p9bGKMOALMWmb4twg-OEgu4rmqXhs',
            'Cello': '1fOlgiCvh4QXYe7V246MI2TrlbTjy_B-S',
            'Clarinet': '1H0VihbQDqQUbIT7m_d_3m8FtDf0FUIOe',
            'Contrabass': '1Q5ajw5wOU82K4y7QrmJ7tWxt11z_cL6T',
            'Cymbal': '1FeDzU6TGQckI0yfDCPL9iMIKUDUQWRYK',
            'English horn': '1IiqjydfVwXec6B7FQIkWUKeWFqe034zK',
            'fagotto': '1ji_oYvyiCucgGGplCiRrVk1iIBiGKZ3B',
            'flute': '1j8VUgr_6yT1r9LNuhikU3xdQyY6CQSlo',
            'Guitar': '1x2SMYe2e07NDRqASZJnEyWsqPToU_rMd',
            'Harp': '1H-jcR5my918L-N3gnP16qh30TsnlWqXF',
            'Horn': '1y0UgUz8bAbeB9B5FPDUwIVyVjd7_nHM8',
            'oboe': '10qyZ_6DQbDOr58qieoXRWLC5ZQqwRCU8',
            'Piano': '1liKGEwEef2T0HnnA_2gNBDk5RXv2wRo6',
            'piccolo': '1ZN166lE-7VtXrxiYr79QtWjlRfYmm7b5',
            'Timpani': '1v43FzwzAWSB9ThV1Pwpm6IF-pgjshsCw',
            'Trombone': '1Nj0zE0M4WXs--FByF70HTeJxLzrQG-rd',
            'Trumpet': '1sE-kqoF9pWeh0lmw7TQ5eiyPTMud0Wfg',
            'tuba': '1vlyyyfIHO4GIHp60MlayHqR0ceg5cRj9',
            'vibraphone': '1yy4Dq5K31ilVCx3rFK0GdPu8e7Q6Rvrq',
            'Xylophone': '1Qw0NPoXu5JPJ8u2yhNrISTI7UVnDx48H'
        };

        let currentInstrumentId = ""; // Κρατάμε ποιο όργανο είναι ανοιχτό

        const listDiv = document.getElementById('list');

        Object.keys(instruments).forEach(id => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="instrument-img-container">
                    <img src="photos/${id}.png" class="instrument-img" onerror="this.src='https://via.placeholder.com/90'">
                </div>
                <div class="instrument-name">${instruments[id]}</div>
                <div class="button-column">
                    <img src="photos/i.png" class="action-icon" onclick="openPopup('${id}')">
                    <img src="photos/play.png" class="action-icon" onclick="openVideo('${id}')">
                </div>
            `;
            listDiv.appendChild(card);
        });

        function openPopup(id) {
            currentInstrumentId = id;
            document.getElementById('modal-tabs').style.display = 'flex'; // Δείξε τα tabs
            // Reset στο πρώτο tab
            const firstTab = document.querySelector('.tab-link');
            changeTab(firstTab, 'info');
            
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function openVideo(id) {
            document.getElementById('modal-tabs').style.display = 'none'; // Κρύψε τα tabs στο βίντεο
            document.getElementById('frame').src = `https://drive.google.com/file/d/${driveIds[id]}/preview`;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function changeTab(element, type) {
            // Αλλαγή εμφάνισης κουμπιών
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            // Αλλαγή URL στο iframe ανάλογα με το tab
            let url = "";
            if(type === 'info') url = `${currentInstrumentId}Info.html`;
            if(type === 'qa') url = `${currentInstrumentId}QA.html`;
            if(type === 'rep') url = `${currentInstrumentId}Rep.html`;
            
            document.getElementById('frame').src = url;
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('frame').src = "";
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
